# Produktions-Stack, anbieter-neutral: laeuft auf jedem Linux-Server mit Docker.
# Caddy uebernimmt automatisch HTTPS (Let's Encrypt), sobald die Domains per
# DNS auf den Server zeigen. Pro Verein ein Astro-Server und eine eigene
# PocketBase-Instanz (getrennte Mitgliederdaten).
#
# Domains und ACME-E-Mail in .env eintragen (siehe .env.example).

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    env_file: .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - astro-goerlitz
      - astro-goerlitz2
      - astro-leipzig

  # ---------- Goerlitz 1 ----------
  astro-goerlitz:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.astro
      args:
        SITE_ID: goerlitz
    restart: unless-stopped
    env_file: .env
    environment:
      SITE_ID: goerlitz
      PB_URL: http://pb-goerlitz:8090
      PB_PUBLIC_URL: https://${DOMAIN_GOERLITZ}
      APK_PFAD: /downloads/canna-verein.apk
    volumes:
      # Android-APK fuer den Mitglieder-Download (Seite /mitglieder/app).
      # Datei aus dem GitHub-Actions-Build nach deploy/downloads/ legen.
      - ./downloads:/downloads:ro
    depends_on:
      - pb-goerlitz
  pb-goerlitz:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pocketbase
    restart: unless-stopped
    # CRON_TOKEN fuer den taeglichen Erinnerungs-Hook (pb_hooks/erinnerungen.pb.js).
    environment:
      CRON_TOKEN: ${CRON_TOKEN}
      ERINNERUNG_TARGET: http://astro-goerlitz:4321
    volumes:
      - pb_goerlitz:/pb/pb_data
      # JS-Hooks (u. a. Erinnerungs-Cron). Nur lesend eingebunden.
      - ./pb_hooks:/pb/pb_hooks:ro
      # Automatische PocketBase-Backups landen auf dem Host (überleben so einen
      # Verlust des pb_data-Volumes). Off-site zusätzlich sichern.
      - ./backups/goerlitz:/pb/pb_data/backups

  # ---------- CVG (Produktiv-Instanz) ----------
  astro-cvg:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.astro
      args:
        SITE_ID: cvg
    restart: unless-stopped
    env_file: .env
    environment:
      SITE_ID: cvg
      PB_URL: http://pb-cvg:8090
      PB_PUBLIC_URL: https://${DOMAIN_CVG}
    depends_on:
      - pb-cvg
  pb-cvg:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pocketbase
    restart: unless-stopped
    environment:
      CRON_TOKEN: ${CRON_TOKEN}
      ERINNERUNG_TARGET: http://astro-cvg:4321
    volumes:
      - pb_cvg:/pb/pb_data
      - ./pb_hooks:/pb/pb_hooks:ro
      - ./backups/cvg:/pb/pb_data/backups

  # ---------- Goerlitz 2 (CSC) ----------
  astro-goerlitz2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.astro
      args:
        SITE_ID: goerlitz2
    restart: unless-stopped
    env_file: .env
    environment:
      SITE_ID: goerlitz2
      PB_URL: http://pb-goerlitz2:8090
      PB_PUBLIC_URL: https://${DOMAIN_GOERLITZ2}
    depends_on:
      - pb-goerlitz2
  pb-goerlitz2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pocketbase
    restart: unless-stopped
    volumes:
      - pb_goerlitz2:/pb/pb_data

  # ---------- Leipzig ----------
  astro-leipzig:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.astro
      args:
        SITE_ID: leipzig
    restart: unless-stopped
    env_file: .env
    environment:
      SITE_ID: leipzig
      PB_URL: http://pb-leipzig:8090
      PB_PUBLIC_URL: https://${DOMAIN_LEIPZIG}
    depends_on:
      - pb-leipzig
  pb-leipzig:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.pocketbase
    restart: unless-stopped
    volumes:
      - pb_leipzig:/pb/pb_data

volumes:
  caddy_data:
  caddy_config:
  pb_goerlitz:
    name: canna_pb_goerlitz
  pb_cvg:
    name: canna_pb_cvg
  pb_goerlitz2:
    name: canna_pb_goerlitz2
  pb_leipzig:
    name: canna_pb_leipzig
