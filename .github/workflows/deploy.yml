name: Deploy oeffentliche Seiten (GitHub Pages)

# Bewusst NUR manuell: der echte Betrieb läuft per SSH-Deploy auf den Netcup-VPS
# (nicht über GitHub). Diese öffentliche Vorschau (GitHub Pages) wird bei Bedarf
# von Hand gestartet — Actions-Tab › "Run workflow" — statt bei jedem Push.
# Verhindert Fehlermails, wenn der GitHub-Pages-Veröffentlichungsschritt hakt.
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein Deploy gleichzeitig; laufende nicht abbrechen.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Alle Vereinsseiten statisch bauen (Uebersicht + drei Unterordner)
        run: npm run build:sites
        env:
          # Project Pages liegen unter /<repo>/ -> Basis-Pfad entsprechend setzen.
          # Das Build-Skript haengt je Verein den eigenen Unterpfad an.
          BASE_PATH: /${{ github.event.repository.name }}/
          SITE_URL: https://${{ github.repository_owner }}.github.io
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
