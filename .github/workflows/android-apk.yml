# Baut die Android-App (Capacitor-Wrapper) als signierte APK.
#
# Signatur: Liegt das Secret ANDROID_KEYSTORE_BASE64 vor, wird mit dem
# Vereins-Keystore signiert (WICHTIG fuer Updates: immer derselbe Keystore,
# sonst muessen Mitglieder die App neu installieren). Ohne Secret wird mit
# einem Debug-Key signiert - nur zum Ausprobieren.
#
# Keystore einmalig erzeugen (z. B. hier in einem GitHub-Codespace oder wo
# Java installiert ist) und als Secrets hinterlegen:
#   keytool -genkeypair -v -keystore canna-verein.keystore -alias verein \
#     -keyalg RSA -keysize 2048 -validity 10000
#   base64 -w0 canna-verein.keystore  ->  Secret ANDROID_KEYSTORE_BASE64
#   dazu: ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS (verein)
name: Android-APK bauen

on:
  workflow_dispatch:
    inputs:
      app_url:
        description: 'URL der Vereins-Site, die die App laedt'
        default: 'https://goerlitz.89.58.9.0.nip.io'
        required: true
      # Hinweis: Paketname + App-Name stecken im Android-Projekt (app/android).
      # Fuer weitere Vereine spaeter eigene Build-Flavors anlegen.
  push:
    tags:
      - 'app-v*'

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Capacitor-Abhaengigkeiten installieren
        working-directory: app
        run: npm ci

      - name: Web-Assets und Config nach Android synchronisieren
        working-directory: app
        env:
          APP_URL: ${{ github.event.inputs.app_url || 'https://goerlitz.89.58.9.0.nip.io' }}
        run: npx cap sync android

      - name: Release-APK bauen (unsigniert)
        working-directory: app/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Keystore aus Secret wiederherstellen
        id: keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > /tmp/verein.keystore
            echo "vorhanden=ja" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Kein ANDROID_KEYSTORE_BASE64-Secret - APK wird nur debug-signiert (nicht fuer Verteilung an Mitglieder verwenden)."
            keytool -genkeypair -v -keystore /tmp/verein.keystore -alias verein \
              -keyalg RSA -keysize 2048 -validity 60 \
              -storepass debug-nur-test -dname "CN=Debug"
            echo "vorhanden=nein" >> "$GITHUB_OUTPUT"
          fi

      - name: APK signieren (zipalign + apksigner)
        working-directory: app/android
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || 'debug-nur-test' }}
          KS_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || 'verein' }}
        run: |
          BUILD_TOOLS="$ANDROID_HOME/build-tools/$(ls "$ANDROID_HOME/build-tools" | sort -V | tail -1)"
          UNSIGNED=app/build/outputs/apk/release/app-release-unsigned.apk
          "$BUILD_TOOLS/zipalign" -f -p 4 "$UNSIGNED" /tmp/aligned.apk
          "$BUILD_TOOLS/apksigner" sign \
            --ks /tmp/verein.keystore \
            --ks-key-alias "$KS_ALIAS" \
            --ks-pass "pass:$KS_PASS" \
            --out /tmp/canna-verein.apk \
            /tmp/aligned.apk
          "$BUILD_TOOLS/apksigner" verify /tmp/canna-verein.apk

      - name: APK als Artifact hochladen
        uses: actions/upload-artifact@v4
        with:
          name: canna-verein-apk
          path: /tmp/canna-verein.apk
          retention-days: 30
